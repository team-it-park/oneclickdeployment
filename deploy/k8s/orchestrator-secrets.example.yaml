# Copy to orchestrator-secrets.yaml (do not commit real values), then:
#   kubectl apply -f orchestrator-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secrets
  namespace: user-apps
type: Opaque
stringData:
  HARBOR_PASSWORD: "REPLACE_ME"
  ORCHESTRATOR_SHARED_SECRET: "REPLACE_ME"
