<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/app.css">
    <title>Go Vercel • Email sign up</title>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <div class="logo" aria-hidden="true"></div>
                <div>Go Vercel <span class="subtle">deploy demo</span></div>
            </div>
            <div class="actions">
                <a class="btn" href="/signup">Back</a>
            </div>
        </div>

        <div class="container">
            <div class="card" style="max-width:520px;margin:0 auto;">
                <h1>Create account</h1>
                <p class="small muted">Password must be at least <span class="kbd">8</span> characters.</p>
                <div class="divider"></div>
                <form method="post" action="/signup/password">
                    <div class="field">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="yourname" required>
                    </div>
                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@company.com" required>
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="row" style="justify-content:space-between;margin-top:16px;">
                        <a class="btn" href="/">Sign in instead</a>
                        <button class="btn primary" type="submit">Create account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
