<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/app.css">
    <title>LaunchPad • Verify (legacy)</title>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div class="brand">
                <div class="logo" aria-hidden="true"></div>
                <div>LaunchPad <span class="subtle">one‑click deployments</span></div>
            </div>
        </div>
        <div class="container">
            <div class="card" style="max-width:640px;margin:0 auto;">
                <h1>Legacy verification page</h1>
                <p class="small muted">This page belonged to the old “OTP via email” flow. You can ignore it if you’re using email+password auth.</p>
                <div class="divider"></div>
                <form method="post">
                    <div class="field">
                        <label for="verification_code">Verification Code</label>
                        <input type="text" id="verification_code" name="verification_code" placeholder="12345">
                    </div>
                    <div class="row" style="justify-content:flex-end;margin-top:14px;">
                        <button class="btn primary" type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
