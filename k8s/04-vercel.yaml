apiVersion: v1
kind: Secret
metadata:
  name: vercel-env
  namespace: go-vercel-platform
type: Opaque
stringData:
  # REQUIRED
  ADDR: ":8080"
  # Session encryption key (change this!)
  SECRET: "change-me-change-me-change-me"
  # Postgres DSN for GORM (points at the in-cluster postgres Service)
  DBADDRESS: "host=postgres.go-vercel-platform.svc.cluster.local user=vercel password=change-me dbname=vercel port=5432 sslmode=disable"

  # GitHub OAuth (optional if you only want email/password)
  CLIENT_ID: ""
  CLIENT_SECRET: ""
  GITHUB_OAUTH_CALLBACK_PATH: "/oauth/github/callback"

  # Orchestrator (in-cluster service DNS)
  ORCHESTRATOR_ADDR: "http://go-vercel-orchestrator.go-vercel-platform.svc.cluster.local:8081"
  # ORCHESTRATOR_SHARED_SECRET: "shared-secret"
  # ORCHESTRATOR_DEFAULT_GIT_REF: "refs/heads/main"
  # ORCHESTRATOR_HTTP_TIMEOUT_MINUTES: "45"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-vercel-web
  namespace: go-vercel-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-vercel-web
  template:
    metadata:
      labels:
        app: go-vercel-web
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: web
          # Set to your pushed image:
          image: git.neev.work/go-vercel-apps/go-vercel-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: vercel-env
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: go-vercel-web
  namespace: go-vercel-platform
spec:
  selector:
    app: go-vercel-web
  ports:
    - name: http
      port: 80
      targetPort: 8080

